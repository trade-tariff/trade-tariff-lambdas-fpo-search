name: deploy-to-development

on:
  push:
    branches-ignore:
       - main
       - "hotfix/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Ruff
        run: pip install ruff==0.1.6

      - name: Run Linting
        run: ruff check .

  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
          pip install dill

      - name: Run Tests
        run: python -m unittest -v -b

  build-ami:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::844815912454:role/GithubActions-FPO-Models-Role
          aws-region: eu-west-2

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run the scripts
        run: .github/bin/buildami

  build-model:
    needs: build-ami
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::844815912454:role/GithubActions-FPO-Models-Role
          aws-region: eu-west-2

      - name: Checkout Repository and fetch git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch (for needsmodel comparison)
        run: git fetch origin main:refs/remotes/origin/main

      - name: Run the scripts
        run: .github/bin/buildmodel

  validate-model:
    needs: build-model
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::382373577178:role/GithubActions-FPO-Models-Role ## assume prod role as getmodel uses prod S3 bucket
          aws-region: eu-west-2

      - name: Checkout Repository and fetch git history
        uses: actions/checkout@v4

      - name: Run the scripts
        run: .github/bin/validatemodel

  fetch-model:
    needs: validate-model
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::382373577178:role/GithubActions-FPO-Models-Role ## assume prod role as getmodel uses prod S3 bucket
          aws-region: eu-west-2

      - name: Checkout Repository and fetch git history
        uses: actions/checkout@v4

      - name: Run the scripts
        run: .github/bin/fetchmodel development

      - name: Persist To Workspace
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            target/
            search-config.toml
            MODEL_VERSION

  build:
    needs: fetch-model
    runs-on: ubuntu-latest
    env:
      FPO_SEARCH_ECR_URL: 382373577178.dkr.ecr.eu-west-2.amazonaws.com/tariff-fpo-search-production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::844815912454:role/GithubActions-ECS-Deployments-Role
          aws-region: eu-west-2

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Download Model Artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install requests==2.32.0

      - name: Build and Push to ECR
        run: |
          source venv/bin/activate
          .github/bin/download_search_references
          .github/bin/ecr "$FPO_SEARCH_ECR_URL"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::844815912454:role/GithubActions-Serverless-Lambda-Role
          aws-region: eu-west-2

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Serverless CLI
        run: npm install -g serverless@3

      - name: Install Serverless Domain Manager Plugin
        run: npm install -g serverless-domain-manager

      - name: Deploy
        run: |
          export STAGE=development
          export DOCKER_TAG=$(git rev-parse --short HEAD)
          export SENTRY_DSN=$(.github/bin/getsecret fpo-search-sentry-dsn)
          export FPO_SEARCH_ECR_URL=382373577178.dkr.ecr.eu-west-2.amazonaws.com/tariff-fpo-search-production
          make deploy-development

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Slack
        uses: trade-tariff/trade-tariff-tools/.github/actions/slack-notify@main
        with:
          result: ${{ needs.deploy.result }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}

  perftest:
    needs: deploy
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run the scripts
        run: .github/bin/perf https://search.dev.trade-tariff.service.gov.uk ${{ secrets.SMOKETEST_API_KEY }}

  e2etest:
    uses: trade-tariff/trade-tariff-tools/.github/workflows/e2e-fpo-tests.yml@HMRC-896-adds-e2e-tests-workflow
    needs: deploy
    with:
      test-url: "https://hub.dev.trade-tariff.service.gov.uk"
    secrets:
      scp-username: ${{ secrets.SCP_USERNAME }}
      scp-password: ${{ secrets.SCP_PASSWORD }}

  smoketest:
    needs: deploy
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run the scripts
        run: .github/bin/smoketest https://search.dev.trade-tariff.service.gov.uk ${{ secrets.SMOKETEST_API_KEY }}

  # This is required however cron for automated builds is commented out in the circeci config as there is an issue with them.
